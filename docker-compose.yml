version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - SQLITE_DB_PATH=/app/data/activity.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # These must be passed in via Dockge environment variables or a .env file
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # The frontend server container can reach the backend container directly
      - API_URL=http://backend:8000
